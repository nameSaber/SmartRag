name: smart_rag_fastapi

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-rag-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: PaiSmart FastAPI
      DATABASE_URL: mysql+pymysql://smart_rag:SmartRag2026@mysql:3306/pai_smart_fastapi?charset=utf8mb4
      JWT_SECRET_KEY: change-me-in-production
      REDIS_URL: redis://:PaiSmart2025@redis:6379/0
      ES_URL: http://elastic:PaiSmart2025@es:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FILE_PROCESSING_BACKEND: kafka
      FILE_PROCESSING_TOPIC: file-processing
      MINIO_ENDPOINT: minio:19000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: PaiSmart2025
      MINIO_BUCKET: pai-smart
      OBJECT_STORAGE_BACKEND: minio
      SEARCH_BACKEND: elasticsearch
      ES_INDEX_NAME: pai_smart_documents
      LLM_BACKEND: openai_compatible
      LLM_API_BASE_URL: https://api.deepseek.com
      LLM_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLM_MODEL_NAME: deepseek-v4-flash
      EMBEDDING_BACKEND: mock
      RATE_LIMIT_BACKEND: redis
      REGISTRATION_MODE: OPEN
      AUTO_CREATE_SCHEMA: "false"

  file-consumer:
    profiles:
      - consumer
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-rag-file-consumer
    restart: unless-stopped
    command: ["python", "-m", "app.consumers.file_processing_consumer"]
    environment:
      APP_NAME: PaiSmart FastAPI
      DATABASE_URL: mysql+pymysql://smart_rag:SmartRag2026@mysql:3306/pai_smart_fastapi?charset=utf8mb4
      JWT_SECRET_KEY: change-me-in-production
      REDIS_URL: redis://:PaiSmart2025@redis:6379/0
      ES_URL: http://elastic:PaiSmart2025@es:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FILE_PROCESSING_BACKEND: kafka
      FILE_PROCESSING_TOPIC: file-processing
      MINIO_ENDPOINT: minio:19000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: PaiSmart2025
      MINIO_BUCKET: pai-smart
      OBJECT_STORAGE_BACKEND: minio
      SEARCH_BACKEND: elasticsearch
      ES_INDEX_NAME: pai_smart_documents
      LLM_BACKEND: openai_compatible
      LLM_API_BASE_URL: https://api.deepseek.com
      LLM_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLM_MODEL_NAME: deepseek-v4-flash
      EMBEDDING_BACKEND: mock
      RATE_LIMIT_BACKEND: redis
      REGISTRATION_MODE: OPEN
      AUTO_CREATE_SCHEMA: "false"

networks:
  default:
    name: pai_smart_default
    external: true
